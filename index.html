<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjeta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Calculadora de Gorjeta</h1>
    <header>
        <img src="./images/logo.svg" alt="Logo do Splitter">
    </header>

    <main>
        <section class="informacoes">
            <form action="">
                <div class="conta">
                    <label for="conta">Conta</label>
                    <div>
                        <img src="./images/icon-dollar.svg" alt="Icone do Sifrão">
                        <input type="number" name="conta" id="conta" placeholder="0">
                    </div>
                </div>

                <div class="gorjeta">
                   <label for="outra">Selecione a gorjeta %</label>

                   <div>
                    <input type="button" value="5%">
                    <input type="button" value="10%">
                    <input type="button" value="15%">
                    <input type="button" value="25%">
                    <input type="button" value="50%">
                    <input type="number" name="outra" id="outra" placeholder="Outra">
                   </div>
                </div>

                <div class="pessoas">
                    <label for="pessoas">Quantidade de pessoas</label>
                    <p>Não pode ser zero</p>
                    <div>
                        <img src="./images/icon-person.svg" alt="Icone da pessoa">
                        <input type="number" name="pessoas" id="pessoas" placeholder="0">
                    </div>
                </div>
            </form>

        </section>

        <section class="resultados">
            <div class="gorjeta-total">
                <p>
                    <strong>Gorjeta</strong> <br>
                    / pessoa
                </p>
                

                <strong>$0.00</strong>
            </div>

             <div class="total">
                <p>
                    <strong>Total</strong> <br>
                    / pessoa
                </p>
                

                <strong>$0.00</strong>
            </div>
        </section>
    </main>
</body>
</html>
